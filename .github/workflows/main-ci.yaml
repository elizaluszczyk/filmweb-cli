name: main-ci

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYREFLY_VERSION: "0.49.0"
  RUFF_VERSION: "0.14.8"
  TAPLO_VERSION: "0.9.3"

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install --no-cache-dir ruff==${{ env.RUFF_VERSION }} pyrefly==${{ env.PYREFLY_VERSION }}
          pip install -r ./requirements/typing.txt -r ./requirements/base.txt
          ruff check .
          pyrefly check .

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/${{ env.TAPLO_VERSION }}/taplo-linux-x86_64.gz | gunzip -c - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Run Taplo
        run: taplo format --check --diff

  build:
    runs-on: ubuntu-latest
    needs: [lint, taplo]
    container:
      image: python:3.12-alpine
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install --no-cache-dir build
          python -m build --sdist --wheel --outdir dist

  release:
      runs-on: ubuntu-latest
      needs: [build]
      if: startsWith(github.ref, 'refs/tags/v')
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4

        - name: Verify version and extract release notes
          run: |
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            PYPROJECT_VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version\s*=\s*"(.*)"/\1/')

            [ "$TAG_VERSION" = "$PYPROJECT_VERSION" ] || { echo "::error::Tag ($TAG_VERSION) != pyproject.toml ($PYPROJECT_VERSION)"; exit 1; }
            grep -qE "^## \[${TAG_VERSION}\]" CHANGELOG.md || { echo "::error::No CHANGELOG.md section for $TAG_VERSION"; exit 1; }

            awk -v ver="$TAG_VERSION" '
              /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") { found=1; next } }
              found { print }
            ' CHANGELOG.md > release_notes.md

        - name: Download dist artifact
          uses: actions/download-artifact@v4
          with:
            name: dist
            path: dist

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ github.ref_name }}
            body_path: release_notes.md
            files: dist/*
